# Firebase App Hosting configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# App Hosting does NOT read .env.local — runtime config must live here.

runConfig:
  minInstances: 0
  maxInstances: 2

env:
  # Public Firebase Web API key (safe to commit — it ships in client apps).
  # Used server-side by the login route (Identity Toolkit REST sign-in).
  - variable: FIREBASE_WEB_API_KEY
    value: AIzaSyBpCaCKhVVAfjoyppv5dwWLKjms1jyEY9M
    availability:
      - RUNTIME

  # Comma-separated admin allowlist (only these emails may sign in).
  - variable: ADMIN_EMAILS
    value: mohabhrc58@gmail.com
    availability:
      - RUNTIME

  # Service-account JSON (same one as local .env.local), stored in Secret
  # Manager. Signing session cookies with this key happens locally, so the
  # backend needs NO extra IAM roles. Create the secret BEFORE deploying:
  #   firebase apphosting:secrets:set FIREBASE_SERVICE_ACCOUNT_KEY --data-file <serviceAccount.json>
  # (grant access when prompted), then deploy.
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: FIREBASE_SERVICE_ACCOUNT_KEY
    availability:
      - RUNTIME

# Alternative (no secret): remove the block above to use the backend's own
# service account via Application Default Credentials. Then grant that service
# account these IAM roles:
#   - Cloud Datastore User           (Firestore read/write)
#   - Service Account Token Creator  (to sign login session cookies)
